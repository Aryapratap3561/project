<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>

<h1>Expense Tracker</h1>

<form action="/add" method="POST">

    <input type="date" name="date" required>

    <input
        type="number"
        name="amount"
        placeholder="Amount"
        required>

    <select name="category">

        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Bills</option>

    </select>

    <input
        type="text"
        name="description"
        placeholder="Description">

    <button type="submit">
        Add Expense
    </button>

</form>

<hr>

<table border="1">

<tr>
    <th>Date</th>
    <th>Amount</th>
    <th>Category</th>
    <th>Description</th>
</tr>

{% for expense in expenses %}

<tr>
    <td>{{ expense[0] }}</td>
    <td>{{ expense[1] }}</td>
    <td>{{ expense[2] }}</td>
    <td>{{ expense[3] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5"></div>
